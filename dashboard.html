<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a10">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Gredo · Dashboard</title>
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <nav class="top-nav">
    <a class="nav-btn" href="index.html" aria-label="시계 화면으로 돌아가기" data-tooltip="🕒 Clock · 디지털 시계">
      <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <polyline points="12 7 12 12 15 14"></polyline>
      </svg>
    </a>
    <a class="nav-btn" href="toDoList.html" aria-label="할 일 목록" data-tooltip="✅ Today's Plan · 오늘 할 일">
      <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"></line>
        <line x1="8" y1="12" x2="21" y2="12"></line>
        <line x1="8" y1="18" x2="21" y2="18"></line>
        <line x1="3" y1="6" x2="3.01" y2="6"></line>
        <line x1="3" y1="12" x2="3.01" y2="12"></line>
        <line x1="3" y1="18" x2="3.01" y2="18"></line>
      </svg>
    </a>
    <a class="nav-btn" href="background.html" aria-label="나만의 배경" data-tooltip="🖼️ My Background · 나만의 배경 만들기">
      <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <path d="M21 15l-5-5L5 21"></path>
      </svg>
    </a>
    <button class="nav-btn" id="fullscreenToggle" aria-label="전체화면">
      <svg class="icon-enter" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
        <path d="M16 3h3a2 2 0 0 1 2 2v3"></path>
        <path d="M8 21H5a2 2 0 0 1-2-2v-3"></path>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
      </svg>
      <svg class="icon-exit" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3v3a2 2 0 0 1-2 2H4"></path>
        <path d="M15 3v3a2 2 0 0 0 2 2h3"></path>
        <path d="M9 21v-3a2 2 0 0 0-2-2H4"></path>
        <path d="M15 21v-3a2 2 0 0 1 2-2h3"></path>
      </svg>
    </button>
  </nav>

  <div class="dashboard">
    <section class="card weather-card">
      <span class="card-glare"></span>
      <div class="weather-date" id="dashboardDate">2026년 7월 22일 (수)</div>
      <div class="divider"></div>
      <div class="weather-row">
        <span class="weather-icon-wrap"><span class="weather-icon" id="weatherIcon">🌤️</span></span>
        <div class="weather-info">
          <div class="weather-city" id="weatherCity">위치 확인 중...</div>
          <div class="weather-desc" id="weatherDesc"></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="quote-block">
        <span class="quote-text" id="quoteText"></span>
        <span class="quote-heart">♥</span>
      </div>
    </section>

    <section class="card clock-card">
      <span class="card-glare"></span>
      <div class="clock-date" id="clockDate">2026.07.22 | WED</div>
      <div class="clock-time-row">
        <span class="clock-ampm" id="clockAmpm">AM</span>
        <span class="clock-time" id="clockTime">11:17</span>
        <span class="clock-seconds" id="clockSeconds">37</span>
      </div>
    </section>

    <section class="card timer-card">
      <span class="card-glare"></span>
      <div class="timer-header">
        <span class="timer-title"><span class="timer-emoji">🍅</span>Focus Timer</span>
        <button class="timer-gear" id="pomodoroGearBtn" aria-label="포모도로 설정">
          <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>

      <div class="timer-tabs" id="timerTabs">
        <button class="timer-tab active" data-tab="pomodoro">포모도로</button>
        <button class="timer-tab" data-tab="timer">타이머</button>
        <button class="timer-tab" data-tab="stopwatch">스톱워치</button>
      </div>

      <div class="timer-settings-popover hidden" id="pomodoroSettingsPopover">
        <div class="mini-row">
          <span>집중</span>
          <div class="mini-stepper">
            <button data-key="work" data-delta="-5" aria-label="집중 시간 축소">−</button>
            <span id="popWorkValue">25분</span>
            <button data-key="work" data-delta="5" aria-label="집중 시간 확대">+</button>
          </div>
        </div>
        <div class="mini-row">
          <span>짧은 휴식</span>
          <div class="mini-stepper">
            <button data-key="shortBreak" data-delta="-1" aria-label="짧은 휴식 축소">−</button>
            <span id="popShortValue">5분</span>
            <button data-key="shortBreak" data-delta="1" aria-label="짧은 휴식 확대">+</button>
          </div>
        </div>
        <div class="mini-row">
          <span>긴 휴식</span>
          <div class="mini-stepper">
            <button data-key="longBreak" data-delta="-5" aria-label="긴 휴식 축소">−</button>
            <span id="popLongValue">15분</span>
            <button data-key="longBreak" data-delta="5" aria-label="긴 휴식 확대">+</button>
          </div>
        </div>
      </div>

      <div class="timer-display" id="timerDisplay">25:00</div>

      <div class="timer-minute-row hidden" id="timerMinuteRow">
        <button class="mini-stepper-btn" id="timerMinusBtn" aria-label="타이머 시간 축소">−</button>
        <span id="timerMinutesLabel">10분</span>
        <button class="mini-stepper-btn" id="timerPlusBtn" aria-label="타이머 시간 확대">+</button>
      </div>

      <div class="timer-actions">
        <button class="timer-reset-btn" id="timerResetBtn" aria-label="초기화">
          <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 3-6.7"></path>
            <path d="M3 4v5h5"></path>
          </svg>
        </button>
        <button class="timer-start-btn" id="timerStartBtn">▶ 시작하기</button>
      </div>

      <div class="timer-caption" id="timerCaption">25분 집중 · 5분 휴식</div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

<script src="js/timer.js"></script>
<script src="js/core/notifications.js"></script>
<script src="js/core/pomodoroEngine.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
